<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World - Members</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:url('bg4.png') no-repeat center center/cover;
  min-height:100vh;
  color:#111;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:10px;
}

.back-btn{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  color:white;
  cursor:pointer;
}

/* MAIN */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 15px;
}

/* CEO CARD */
.ceo-card{
  width:280px;
  padding:20px;
  border-radius:20px;
  text-align:center;
  background:linear-gradient(135deg,#ffd700,#fff2a8);
  box-shadow:0 0 25px rgba(255,215,0,0.8);
  margin-bottom:30px;
  cursor:pointer;
  transition:0.3s;
}

.ceo-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(255,215,0,1);
}

.ceo-card img{
  width:80px;
  height:80px;
  border-radius:15px;
  margin-bottom:10px;
}

.ceo-card h3{
  font-size:18px;
}

.ceo-card p{
  font-size:13px;
}

/* TEAM GRID */
.team{
  display:grid;
  grid-template-columns:repeat(2, 200px);
  gap:20px;
}

/* TEAM CARD */
.card{
  padding:20px;
  border-radius:20px;
  text-align:center;
  background:linear-gradient(135deg,#e0e0e0,#f5f5f5);
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
  width:70px;
  height:70px;
  border-radius:15px;
  margin-bottom:10px;
}

.card h3{
  font-size:16px;
}

.card p{
  font-size:12px;
}

/* MOBILE */
@media (max-width:600px){

  .team{
    grid-template-columns:1fr;
  }

  .ceo-card{
    width:90%;
  }

}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo-box">
    <img src="logo.jpg" class="logo">
    <span style="font-weight:600;">UG World</span>
  </div>

  <button class="back-btn" onclick="goBack()">Back</button>
</nav>

<!-- MEMBERS -->
<div class="container">

  <!-- CEO -->
  <div class="ceo-card" onclick="openGithub()">
    <img src="ceo.jpg">
    <h3>MR Utsav Gupta</h3>
    <p>CEO & Founder</p>
  </div>

  <!-- TEAM -->
  <div class="team">

    <div class="card">
      <img src="team1.jpg">
      <h3>Vivansh Gupta</h3>
      <p>Team Member</p>
    </div>

    <div class="card">
      <img src="team2.jpg">
      <h3>Coming Soon</h3>
      <p>New Member</p>
    </div>

  </div>

</div>

<script>
function goBack(){
  window.location.href = "index.html";
}

function openGithub(){
  window.open("https://github.com/", "_blank"); // yaha apna github link daal
}
</script>

</body>
</html>
