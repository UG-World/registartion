<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World - Team</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background:url('bg4.png.jpg') no-repeat center center/cover;
  min-height:100vh;
  color:#111;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:12px;
}

.back-btn{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  color:white;
  cursor:pointer;
}

/* HEADER */
.header{
  text-align:center;
  margin-top:40px;
  padding:0 20px;
}

.header h1{
  font-size:36px;
}

.header p{
  margin-top:10px;
  color:#333;
  font-size:15px;
}

/* TEAM SECTION */
.team-section{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
  gap:30px;
}

/* CEO CARD */
.ceo{
  width:300px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  background:linear-gradient(135deg,#ffd700,#fff3b0);
  box-shadow:0 0 30px rgba(255,215,0,0.8);
  cursor:pointer;
  transition:0.3s;
}

.ceo:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 0 50px rgba(255,215,0,1);
}

.ceo img{
  width:90px;
  height:90px;
  border-radius:16px;
  margin-bottom:10px;
}

.ceo h2{
  font-size:20px;
}

.ceo span{
  font-size:13px;
}

/* TEAM GRID */
.team{
  display:grid;
  grid-template-columns:repeat(2, 250px);
  gap:25px;
}

/* MEMBER CARD */
.member{
  padding:20px;
  border-radius:18px;
  text-align:center;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.member:hover{
  transform:translateY(-5px);
}

.member img{
  width:75px;
  height:75px;
  border-radius:14px;
  margin-bottom:10px;
}

.member h3{
  font-size:17px;
}

.member p{
  font-size:13px;
  color:#333;
}

/* MOBILE */
@media (max-width:600px){

  .team{
    grid-template-columns:1fr;
  }

  .header h1{
    font-size:26px;
  }

}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo-box">
    <img src="logo.jpg" class="logo">
    <span style="font-weight:600;">UG World</span>
  </div>

  <button class="back-btn" onclick="goBack()">Back</button>
</nav>

<!-- HEADER -->
<div class="header">
  <h1>Meet Our Team</h1>
  <p>The minds behind UG World building the future of tech 🚀</p>
</div>

<!-- TEAM -->
<div class="team-section">

  <!-- CEO -->
  <div class="ceo" onclick="openGithub()">
    <img src="ceo.jpg">
    <h2>Mr. Utsav Gupta</h2>
    <span>CEO & Founder</span>
  </div>

  <!-- TEAM -->
  <div class="team">

    <div class="member">
      <img src="team1.jpg">
      <h3>Vivansh Gupta</h3>
      <p>Team Member</p>
    </div>

    <div class="member">
      <img src="team2.jpg">
      <h3>Coming Soon</h3>
      <p>New Member</p>
    </div>

  </div>

</div>

<script>
function goBack(){
  window.location.href = "index.html";
}

function openGithub(){
  window.open("https://github.com/", "_blank"); // apna github link daal
}
</script>

</body>
</html>
