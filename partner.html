<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World - Partner</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
  min-height:100vh;
  overflow:hidden;
  position:relative;
}

/* VIDEO BG */
.bg-video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  position:absolute;
  width:100%;
  top:0;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:10px;
}

.back-btn{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  color:white;
  cursor:pointer;
  width:auto; /* fix full width issue */
  display:inline-block;
}

/* CONTENT */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.box{
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(5px);
  text-align:center;
}

.box h2{
  margin-bottom:10px;
}

.box p{
  margin-bottom:20px;
  font-size:14px;
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
}

textarea{
  resize:none;
  height:80px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media (max-width:480px){
  .box{
    padding:20px;
  }
}

</style>
</head>
<body>

<video autoplay muted loop class="bg-video">
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- NAV -->
<nav>
  <div class="logo-box">
    <img src="logo.jpg" class="logo">
    <span style="font-weight:600;">UG World</span>
  </div>

  
  <button class="back-btn" onclick="goBack()">Back</button>
</nav>

<!-- FORM -->
<div class="container">
  <div class="box">
    <h2>Join as Partner</h2>
    <p>Become a part of UG World and build the future together 🚀</p>

    <form action="https://formspree.io/f/mzdwjynn" method="POST" onsubmit="redirectHome(event)">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>

      <select name="category" required>
        <option value="">Select Category</option>
        <option>App Developer</option>
        <option>Web Developer</option>
      </select>

      <select name="type" required>
        <option value="">Select Type</option>
        <option>Frontend Developer</option>
        <option>Backend Developer</option>
        <option>Full Stack Developer</option>
      </select>

      <select name="level" required>
        <option value="">Experience Level</option>
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
      </select>

      <textarea name="message" placeholder="Why do you want to join UG World?" required></textarea>

      <button type="submit">Apply Now</button>
    </form>

  </div>
</div>

<script>
function goBack(){
  window.location.href = "index.html";
}
function redirectHome(e){
  e.preventDefault();
  window.location.href = "thank.html";
}

</script>

</body>
</html>
