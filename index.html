<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
  background:url('bg.jpg') no-repeat center center/cover;
  height:100vh;
  overflow:hidden;
  color:#111;
}

nav{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  position:absolute;
  width:100%;
  top:0;
}

.nav-container{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:95%;
}

.logo{
  width:40px;
  height:40px;
  border-radius:10px;
}

nav ul{
  display:flex;
  gap:25px;
  list-style:none;
  font-weight:500;
  padding:10px 20px;
  border-radius:30px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(6px);
}

nav ul li{cursor:pointer;white-space:nowrap;}

.partner-btn{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:black;
  color:white;
  cursor:pointer;
}

.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.video-btn{
  position:relative;
  margin-top:25px;
  width:220px;
  height:60px;
  border-radius:40px;
  overflow:hidden;
  cursor:pointer;
}

.video-btn video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.video-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.15);
}

.video-btn span{
  position:relative;
  z-index:2;
  color:white;
  font-weight:bold;
  line-height:60px;
}

@media (max-width:768px){
  .nav-container{flex-direction:column;gap:10px;}
}

</style>
</head>
<body>

<nav>
  <div class="nav-container">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="logo.jpg" class="logo" />
      <span style="font-weight:600;">UG World</span>
    </div>

    <ul>
      <li onclick="goPage('index.html')">Home</li>
      <li onclick="goPage('about.html')">About</li>
      <li onclick="goPage('social.html')">Social</li>
      <li onclick="goPage('members.html')">Members</li>
      <li onclick="goPage('agenda.html')">Agenda</li>
    </ul>

    <button class="partner-btn" onclick="checkAccess()">Join as Partner</button>
  </div>
</nav>

<div class="hero">
  <div>
    <h1>UG World</h1>
    <p>Join the developer community</p>

    <div class="video-btn" onclick="goToRegister()">
      <video autoplay muted loop>
        <source src="btn.mp4" type="video/mp4">
      </video>
      <span>Register Now</span>
    </div>

  </div>
</div>

<script>
function goToRegister(){
  window.location.href = "regestration.html";
}

function goPage(page){
  window.location.href = page;
}

function checkAccess(){
  const code = prompt("Enter Access Code");

  if(code === "UGPARTNER2026"){
    window.location.href = "partner.html";
  } else {
    alert("Invalid Code ❌");
  }
}
</script>

</body>
</html>
