<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
  background:url('bg.jpg') no-repeat center center/cover;
  height:100vh;
  overflow:hidden; /* no scroll */
  color:#111;
}

/* NAV */
nav{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:absolute;
  width:100%;
  top:0;
}

.nav-container{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:90%;
}

.logo{
  width:45px;
  height:45px;
  background:#000;
  border-radius:12px;
}

/* NAV BUTTON GROUP (blur background) */
nav ul{
  display:flex;
  gap:30px;
  list-style:none;
  font-weight:500;
  padding:10px 25px;
  border-radius:30px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(6px); /* 5–7% feel */
}

nav ul li{
  cursor:pointer;
}

/* HERO CENTER */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:42px;
}

.hero p{
  margin-top:10px;
}

/* VIDEO BUTTON */
.video-btn{
  position:relative;
  margin-top:25px;
  width:220px;
  height:60px;
  border-radius:40px;
  overflow:hidden;
  cursor:pointer;
}

.video-btn video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(2px); /* ~2% feel */
  transform:scale(1.05); /* avoid edge clipping after blur */
  will-change:transform, filter;
}

/* subtle overlay to avoid text glitch */
.video-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.15);
}

.video-btn span{
  position:relative;
  z-index:2;
  color:white;
  font-weight:bold;
  line-height:60px;
  pointer-events:none;
}

.video-btn{
  position:relative;
  margin-top:25px;
  width:220px;
  height:60px;
  border-radius:40px;
  overflow:hidden;
  cursor:pointer;
  display:inline-block;
  transition:transform .25s ease;
}

.video-btn span{
  position:relative;
  z-index:2;
  color:white;
  font-weight:bold;
  line-height:60px;
}

.video-btn:hover{
  transform:scale(1.05);
  transition:0.3s;
}

/* 3D OBJECT */
.model{
  width:60px;
  height:60px;
}

</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-container">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="logo.jpg" class="logo" />
      <span style="font-weight:600;font-size:18px;">UG World</span>
    </div>

    <ul>
      <li onclick="goPage('index.html')">Home</li>
      <li onclick="goPage('about.html')">About</li>
      <li onclick="goPage('social.html')">Social</li>
      <li onclick="goPage('ceo.html')">CEO</li>
      <li onclick="goPage('agenda.html')">Agenda</li>
    </ul>

    <div class="model"></div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>UG World</h1>
    <p>Join the developer community</p>

    <div class="video-btn" onclick="goToRegister()">
      <video autoplay muted loop>
        <source src="btn.mp4" type="video/mp4">
      </video>
      <span>Register Now</span>
    </div>

  </div>
</div>

<script>
function goToRegister(){
  window.location.href = "registration.html";
}

function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
